name: Deploy Frontend

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate env vars
        run: |
          if [ -z "${VITE_APP_CLIENT_ID}" ]; then
            echo "Missing VITE_APP_CLIENT_ID"; exit 1;
          fi
        env:
          VITE_APP_CLIENT_ID: ${{ secrets.VITE_APP_CLIENT_ID }}

      - name: Write production env
        run: |
          cat <<EOF > .env.production
          VITE_APP_CLIENT_ID=${{ secrets.VITE_APP_CLIENT_ID }}
          VITE_APP_CLIENT_SECRET=${{ secrets.VITE_APP_CLIENT_SECRET }}
          VITE_APP_REFRESH_TOKEN=${{ secrets.VITE_APP_REFRESH_TOKEN }}
          VITE_APP_API_URL=https://accounts.google.com/gsi/client
          EOF

      - name: Build
        env:
          VITE_APP_CLIENT_ID: ${{ secrets.VITE_APP_CLIENT_ID }}
          VITE_APP_CLIENT_SECRET: ${{ secrets.VITE_APP_CLIENT_SECRET }}
          VITE_APP_REFRESH_TOKEN: ${{ secrets.VITE_APP_REFRESH_TOKEN }}
          VITE_APP_API_URL: "https://accounts.google.com/gsi/client"
        run: npm run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4.1.10
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "dist/"
          REMOTE_HOST: "workerscheduling.eaglesoftwareteam.com"
          REMOTE_USER: "ubuntu"
          TARGET: "/var/www/html/sev2026/t2"
